<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현대아이티 견적 시스템</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;">
    <div class="login-card">

      <div class="login-brand">
        <div class="login-icon-wrap">
          <div class="login-icon">H</div>
        </div>
        <div class="login-brand-name">현대아이티</div>
        <div class="login-brand-eng">HYUNDAI IT</div>
        <div class="login-brand-badge">스마트보드 렌탈 견적 시스템</div>
      </div>

      <form id="loginForm">
        <div class="login-field">
          <label class="login-field-label">아이디</label>
          <input type="text" id="userId" class="login-input" required autocomplete="username" placeholder="아이디를 입력하세요">
        </div>
        <div class="login-field">
          <label class="login-field-label">비밀번호</label>
          <input type="password" id="password" class="login-input" required autocomplete="current-password" placeholder="비밀번호를 입력하세요">
        </div>
        <button type="submit" class="btn-login">로그인</button>
        <div id="loginError" class="login-error" style="display:none"></div>
      </form>

    </div>

    <div class="login-footer">
      © 2026 현대아이티. All rights reserved.<br>
      개발: 전략유통사업본부 &nbsp;|&nbsp; 문의: kjhyun@hyundaiit.com
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const s = getSession();
    if (s) window.location.href = s.role === 'admin' ? 'admin.html' : 'sales.html';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value;
      const result = login(userId, password);
      if (result.success) {
        window.location.href = result.role === 'admin' ? 'admin.html' : 'sales.html';
      } else {
        const err = document.getElementById('loginError');
        err.textContent = result.message;
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
